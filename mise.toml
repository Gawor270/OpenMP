[tools]
cmake = "latest"

[tasks.build]
description = "Configure and build the OpenMP project"
run = ["cmake -S . -B build", "cmake --build build"]

[tasks.run]
description = "Build and run bucket sort with default size"
depends = ["build"]
run = "./build/openmp_bucket_sort 1000000"

[tasks.test_concurrency]
description = "Test bucket sort against multiple thread counts to catch race conditions"
depends = ["build"]
run = [
    "OMP_NUM_THREADS=1 ./build/openmp_bucket_sort 1000000 1 --test",
    "OMP_NUM_THREADS=2 ./build/openmp_bucket_sort 1000000 1 --test",
    "OMP_NUM_THREADS=3 ./build/openmp_bucket_sort 1000000 1 --test",
    "OMP_NUM_THREADS=4 ./build/openmp_bucket_sort 1000000 1 --test",
    "OMP_NUM_THREADS=8 ./build/openmp_bucket_sort 1000000 1 --test",
    "OMP_NUM_THREADS=1 ./build/openmp_bucket_sort 1000000 1 --alg 2 --test",
    "OMP_NUM_THREADS=2 ./build/openmp_bucket_sort 1000000 1 --alg 2 --test",
    "OMP_NUM_THREADS=3 ./build/openmp_bucket_sort 1000000 1 --alg 2 --test",
    "OMP_NUM_THREADS=4 ./build/openmp_bucket_sort 1000000 1 --alg 2 --test",
    "OMP_NUM_THREADS=8 ./build/openmp_bucket_sort 1000000 1 --alg 2 --test"
]

[tasks.test_edges]
description = "Test algorithmic edge cases (empty, single, tiny, huge)"
depends = ["build"]
run = [
    "./build/openmp_bucket_sort 0 1 --test",
    "./build/openmp_bucket_sort 1 1 --test",
    "./build/openmp_bucket_sort 17 1 --test",
    "./build/openmp_bucket_sort 5000000 1 --test",
    "./build/openmp_bucket_sort 0 1 --alg 2 --test",
    "./build/openmp_bucket_sort 1 1 --alg 2 --test",
    "./build/openmp_bucket_sort 17 1 --alg 2 --test",
    "./build/openmp_bucket_sort 5000000 1 --alg 2 --test"
]

[tasks.test_generator]
description = "Run generator uniformity checks"
depends = ["build"]
run = ["ctest --test-dir build -R generator_uniformity"]

[tasks.test]
description = "Run all bucket sort test suites sequentially"
depends = ["test_concurrency", "test_edges", "test_generator"]

[tasks.sweep]
description = "Submit bucket-multiplier sweep job to Ares (run from login node)"
run = "bash scripts/sweep_buckets.sbatch"

[tasks.pack]
description = "Pack submission zip for algorithm 1 or 2 — usage: mise run pack 1|2"
run = '''
#!/usr/bin/env bash
set -euo pipefail

VER="${1:-}"
if [[ "$VER" != "1" && "$VER" != "2" ]]; then
  echo "Usage: mise run pack <1|2>"
  exit 1
fi

OUT="submission_alg${VER}_Gawor.zip"
STAGE=$(mktemp -d)
trap 'rm -rf "$STAGE"' EXIT

mkdir -p "$STAGE/src"

# algorithm-specific files
cp "src/bucketSortAlg${VER}.cpp" "$STAGE/src/"
cp "src/bucketSortAlg${VER}.h"   "$STAGE/src/"

# shared source
for f in src/bucketSort.cpp src/bucketSort.h \
          src/generator.cpp  src/generator.h \
          src/generator_tests.cpp src/main.cpp; do
  cp "$f" "$STAGE/src/"
done

# build system + report
cp CMakeLists.txt                    "$STAGE/"
cp sprawozdanie_section_bucket.tex   "$STAGE/"

# plots referenced by the report
if [[ -d wykresy ]]; then
  cp -r wykresy "$STAGE/"
fi

(cd "$STAGE" && zip -r - .) > "$OUT"
echo "Created: $OUT  ($(du -sh "$OUT" | cut -f1))"
'''

